
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoundScript — Text to Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #e8c97d;
      --accent2: #c47a3e;
      --text: #f0ece0;
      --muted: #6b6560;
      --waveform: #e8c97d44;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      overflow-x: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 720px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }

    header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 900;
      color: var(--text);
      line-height: 1.1;
    }

    header h1 span {
      color: var(--accent);
      font-style: italic;
    }

    header p {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      min-height: 160px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    /* Controls row */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .slider-val {
      font-size: 12px;
      color: var(--accent);
      min-width: 32px;
      text-align: right;
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    /* Waveform visualizer */
    .waveform-wrap {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      padding: 12px 16px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 3px;
      overflow: hidden;
    }

    .bar {
      flex: 1;
      background: var(--waveform);
      border-radius: 2px;
      height: 8px;
      transition: height 0.1s ease;
    }

    .bar.active {
      background: var(--accent);
      animation: pulse var(--dur, 0.6s) ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { height: 6px; }
      to { height: var(--h, 40px); }
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
      font-weight: 500;
    }

    .btn-primary:hover { background: #f5d98a; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Status */
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }

    .status.speaking { color: var(--accent); }
    .status.error { color: #e87d7d; }

    /* Char counter */
    .meta-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    /* No support banner */
    .no-support {
      display: none;
      background: #2a1a1a;
      border: 1px solid #5c2a2a;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      color: #e87d7d;
      margin-top: 16px;
      text-align: center;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    @media (max-width: 520px) {
      .controls { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Web Speech API</div>
      <h1>Sound<span>Script</span></h1>
      <p>Convert any text into natural-sounding speech — right in your browser.</p>
    </header>

    <div class="card">
      <label for="textInput">Your Text</label>
      <textarea id="textInput" placeholder="Type or paste your text here…" spellcheck="true"></textarea>
      <div class="meta-row">
        <span id="wordCount">0 words</span>
        <span id="charCount">0 / 5000 chars</span>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect"><option>Loading voices…</option></select>
        </div>
        <div class="control-group">
          <label>Rate</label>
          <div class="slider-row">
            <input type="range" id="rateSlider" min="0.5" max="2" step="0.05" value="1"/>
            <span class="slider-val" id="rateVal">1.0×</span>
          </div>
          <label style="margin-top:10px">Pitch</label>
          <div class="slider-row">
            <input type="range" id="pitchSlider" min="0" max="2" step="0.05" value="1"/>
            <span class="slider-val" id="pitchVal">1.0</span>
          </div>
          <label style="margin-top:10px">Volume</label>
          <div class="slider-row">
            <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1"/>
            <span class="slider-val" id="volVal">100%</span>
          </div>
        </div>
      </div>

      <!-- Waveform -->
      <div class="waveform-wrap" id="waveform"></div>

      <div class="btn-row">
        <button class="btn btn-primary" id="speakBtn">▶ Speak</button>
        <button class="btn btn-secondary" id="pauseBtn" disabled>⏸ Pause</button>
        <button class="btn btn-secondary" id="stopBtn" disabled>■ Stop</button>
      </div>

      <div class="status" id="status">Ready</div>
      <div class="no-support" id="noSupport">Your browser doesn't support the Web Speech API. Try Chrome or Edge.</div>
    </div>

    <footer>Uses the browser's built-in Web Speech API — no server, no data sent.</footer>
  </div>

  <script>
    const textInput = document.getElementById('textInput');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateSlider = document.getElementById('rateSlider');
    const pitchSlider = document.getElementById('pitchSlider');
    const volSlider = document.getElementById('volSlider');
    const rateVal = document.getElementById('rateVal');
    const pitchVal = document.getElementById('pitchVal');
    const volVal = document.getElementById('volVal');
    const speakBtn = document.getElementById('speakBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const waveformEl = document.getElementById('waveform');
    const noSupport = document.getElementById('noSupport');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');

    const synth = window.speechSynthesis;
    if (!synth) {
      noSupport.style.display = 'block';
      speakBtn.disabled = true;
    }

    // Build waveform bars
    const BAR_COUNT = 48;
    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'bar';
      waveformEl.appendChild(b);
      bars.push(b);
    }

    let waveInterval = null;

    function startWave() {
      bars.forEach(b => {
        const h = Math.floor(Math.random() * 36) + 6;
        const dur = (Math.random() * 0.4 + 0.3).toFixed(2);
        b.style.setProperty('--h', h + 'px');
        b.style.setProperty('--dur', dur + 's');
        b.style.animationDelay = (Math.random() * 0.3).toFixed(2) + 's';
        b.classList.add('active');
      });
      waveInterval = setInterval(() => {
        bars.forEach(b => {
          const h = Math.floor(Math.random() * 36) + 6;
          b.style.setProperty('--h', h + 'px');
        });
      }, 500);
    }

    function stopWave() {
      clearInterval(waveInterval);
      bars.forEach(b => {
        b.classList.remove('active');
        b.style.height = '8px';
      });
    }

    // Load voices
    let voices = [];
    function loadVoices() {
      voices = synth.getVoices();
      if (!voices.length) return;
      voiceSelect.innerHTML = '';
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        if (v.default) opt.selected = true;
        voiceSelect.appendChild(opt);
      });
    }

    loadVoices();
    if (synth && synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }

    // Sliders
    rateSlider.addEventListener('input', () => rateVal.textContent = parseFloat(rateSlider.value).toFixed(2) + '×');
    pitchSlider.addEventListener('input', () => pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(2));
    volSlider.addEventListener('input', () => volVal.textContent = Math.round(volSlider.value * 100) + '%');

    // Word / char count
    textInput.addEventListener('input', () => {
      const text = textInput.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      wordCount.textContent = words + ' word' + (words !== 1 ? 's' : '');
      charCount.textContent = text.length + ' / 5000 chars';
      if (text.length > 5000) charCount.style.color = '#e87d7d';
      else charCount.style.color = '';
    });

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    // Speak
    speakBtn.addEventListener('click', () => {
      if (!synth) return;
      if (synth.speaking) { synth.cancel(); }

      const text = textInput.value.trim();
      if (!text) { setStatus('Please enter some text first.', 'error'); return; }
      if (text.length > 5000) { setStatus('Text too long (max 5000 chars).', 'error'); return; }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.voice = voices[voiceSelect.value] || null;
      utterance.rate = parseFloat(rateSlider.value);
      utterance.pitch = parseFloat(pitchSlider.value);
      utterance.volume = parseFloat(volSlider.value);

      utterance.onstart = () => {
        setStatus('Speaking…', 'speaking');
        startWave();
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
        speakBtn.disabled = true;
      };

      utterance.onend = () => {
        setStatus('Done.');
        stopWave();
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
        speakBtn.disabled = false;
        pauseBtn.textContent = '⏸ Pause';
      };

      utterance.onerror = (e) => {
        setStatus('Error: ' + e.error, 'error');
        stopWave();
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
        speakBtn.disabled = false;
      };

      synth.speak(utterance);
    });

    // Pause / Resume
    let paused = false;
    pauseBtn.addEventListener('click', () => {
      if (!synth.speaking) return;
      if (!paused) {
        synth.pause();
        paused = true;
        pauseBtn.textContent = '▶ Resume';
        setStatus('Paused.');
        stopWave();
      } else {
        synth.resume();
        paused = false;
        pauseBtn.textContent = '⏸ Pause';
        setStatus('Speaking…', 'speaking');
        startWave();
      }
    });

    // Stop
    stopBtn.addEventListener('click', () => {
      synth.cancel();
      paused = false;
      stopWave();
      setStatus('Stopped.');
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      speakBtn.disabled = false;
      pauseBtn.textContent = '⏸ Pause';
    });
  </script>
</body>
</html>
